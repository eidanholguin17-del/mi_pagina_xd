<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowCow - Lista</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #121214; color: #f8f9fa; }
        .anime-card { background-color: #1a1a1e; border: 1px solid #2d2d35; transition: transform 0.2s; }
        .anime-card:hover { transform: translateY(-5px); border-color: #0d6efd; }
        .portada-img { height: 300px; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="{% url 'inicio' %}">🔥 LowCow</a>
            <a href="{% url 'subir_anime' %}" class="btn btn-primary btn-sm">+ Agregar Anime</a>
        </div>
    </nav>

    <div class="container mb-5">
        <h1 class="text-center mb-4">Lista de <span class="text-primary fw-bold">Animes</span></h1>
        
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {% for anime in animes %}
                <div class="col">
                    <div class="card h-100 anime-card text-white shadow-sm">
                        <img src="{{ anime.Portada_Anime.url }}" class="card-img-top portada-img" alt="Portada">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="card-title fw-bold text-truncate">{{ anime.anime }}</h5>
                                <p class="card-text text-muted small">Personaje: <span class="badge bg-secondary">{{ anime.personaje }}</span></p>
                            </div>
                            <div class="d-flex align-items-center justify-content-between bg-black bg-opacity-20 p-2 rounded mt-3">
                                <span class="small text-muted">Logo:</span>
                                <img src="{{ anime.Logo_anime.url }}" alt="Logo" height="35" class="object-fit-contain">
                            </div>
                        </div>
                    </div>
                </div>
            {% empty %}
                <div class="col-12 text-center py-5">
                    <p class="fs-4 text-muted">No hay animes registrados todavía.</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
