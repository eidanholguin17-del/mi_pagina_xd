<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Bootstrap</title>
    
    <!-- 1. El CSS de Bootstrap da la forma y color al botón -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5"> <!-- Agregé un margen para que no quede pegado a la esquina -->

    <!-- Tu código de Bootstrap -->
    <div class="dropdown">
      <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Dropdown button
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">Inicio</a></li>
        <li><a class="dropdown-item" href="#">LaugCow</a></li>
        <li><a class="dropdown-item" href="#">agregar_datos</a></li>
      </ul>
    </div>

    <!-- 2. El JavaScript de Bootstrap hace que la lista se abra al hacer clic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
